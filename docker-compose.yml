version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: progtalk-backend
    ports:
      - "3000:3000"
      - "3443:3443"
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DATABASE=ProgTalk
      - PORT=3000
      - HTTPS_PORT=3443
      - API_HOST=localhost
    depends_on:
      - mongodb
    networks:
      - progtalk-network
    volumes:
      - ./certificate:/app/certificate

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: progtalk-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=https://localhost:3443
    depends_on:
      - backend
    networks:
      - progtalk-network

  mongodb:
    image: mongo:7
    container_name: progtalk-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=ProgTalk
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - progtalk-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  progtalk-network:
    driver: bridge
